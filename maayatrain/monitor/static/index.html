<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaayaTrain Dashboard</title>
    <meta name="description" content="Real-time distributed ML training dashboard for MaayaTrain">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a2235;
            --bg-card-hover: #1f2a40;
            --border: #2a3550;
            --text-primary: #e4e8f1;
            --text-secondary: #8892a8;
            --text-muted: #5a6478;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --accent-emerald: #10b981;
            --accent-amber: #f59e0b;
            --accent-rose: #f43f5e;
            --accent-violet: #8b5cf6;
            --gradient-primary: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --gradient-warm: linear-gradient(135deg, #f59e0b, #f43f5e);
            --shadow-glow: 0 0 20px rgba(59, 130, 246, 0.15);
            --radius: 12px;
            --radius-sm: 8px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-connected {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-emerald);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status-disconnected {
            background: rgba(244, 63, 94, 0.15);
            color: var(--accent-rose);
            border: 1px solid rgba(244, 63, 94, 0.3);
        }

        /* Main layout */
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .full-width { grid-column: 1 / -1; }

        /* Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: all 0.2s ease;
        }

        .card:hover {
            background: var(--bg-card-hover);
            box-shadow: var(--shadow-glow);
        }

        .card-title {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title::before {
            content: '';
            width: 4px;
            height: 16px;
            border-radius: 2px;
            background: var(--gradient-primary);
        }

        /* Stats grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        /* Chart */
        .chart-container {
            position: relative;
            height: 300px;
        }

        /* Peer table */
        .peer-table {
            width: 100%;
            border-collapse: collapse;
        }

        .peer-table th {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            text-align: left;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
        }

        .peer-table td {
            padding: 10px 12px;
            font-size: 0.875rem;
            font-family: 'JetBrains Mono', monospace;
            border-bottom: 1px solid rgba(42, 53, 80, 0.5);
        }

        .peer-table tr:hover td {
            background: rgba(59, 130, 246, 0.05);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }

        .dot-active { background: var(--accent-emerald); box-shadow: 0 0 6px rgba(16, 185, 129, 0.5); }
        .dot-stale { background: var(--accent-amber); }

        /* Checkpoint timeline */
        .checkpoint-list {
            list-style: none;
            max-height: 250px;
            overflow-y: auto;
        }

        .checkpoint-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(42, 53, 80, 0.3);
        }

        .checkpoint-step {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            color: var(--accent-cyan);
            min-width: 80px;
        }

        .checkpoint-loss {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-secondary);
        }

        .checkpoint-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-left: auto;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .empty-state .icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        /* Animations */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .pulse { animation: pulse 2s infinite; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in { animation: fadeIn 0.3s ease; }

        /* Responsive */
        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .header { padding: 12px 16px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <span class="logo">⚡ MaayaTrain</span>
            <span id="statusBadge" class="status-badge status-disconnected">Disconnected</span>
        </div>
        <div style="color: var(--text-muted); font-size: 0.8rem; font-family: 'JetBrains Mono', monospace;">
            v0.1.0
        </div>
    </header>

    <main class="dashboard">
        <!-- Stats Row -->
        <div class="stats-grid full-width fade-in">
            <div class="stat-card">
                <div class="stat-value" id="statStep">0</div>
                <div class="stat-label">Global Step</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statLoss">—</div>
                <div class="stat-label">Loss</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statThroughput">0</div>
                <div class="stat-label">Tokens/sec</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statPeers">0</div>
                <div class="stat-label">Peers</div>
            </div>
        </div>

        <!-- Loss Chart -->
        <div class="card full-width fade-in">
            <div class="card-title">Training Loss</div>
            <div class="chart-container">
                <canvas id="lossChart"></canvas>
            </div>
        </div>

        <!-- Peer Table -->
        <div class="card fade-in">
            <div class="card-title">Connected Peers</div>
            <table class="peer-table">
                <thead>
                    <tr>
                        <th>Status</th>
                        <th>Device</th>
                        <th>Memory</th>
                        <th>TFLOPS</th>
                    </tr>
                </thead>
                <tbody id="peerTableBody">
                    <tr>
                        <td colspan="4" class="empty-state">
                            <div class="icon">📡</div>
                            Waiting for peers…
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Checkpoint Timeline -->
        <div class="card fade-in">
            <div class="card-title">Checkpoint Timeline</div>
            <ul class="checkpoint-list" id="checkpointList">
                <li class="empty-state">
                    <div class="icon">💾</div>
                    No checkpoints yet
                </li>
            </ul>
        </div>
    </main>

    <script>
        // ============================================================
        // MaayaTrain Dashboard — WebSocket-driven real-time UI
        // ============================================================

        const MAX_CHART_POINTS = 500;
        let ws = null;
        let lossChart = null;
        const lossData = { labels: [], values: [] };

        // --- Chart Setup ---
        function initChart() {
            const ctx = document.getElementById('lossChart').getContext('2d');
            lossChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: lossData.labels,
                    datasets: [{
                        label: 'Loss',
                        data: lossData.values,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.08)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.3,
                        pointRadius: 0,
                        pointHoverRadius: 4,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 0 },
                    scales: {
                        x: {
                            grid: { color: 'rgba(42, 53, 80, 0.5)' },
                            ticks: { color: '#5a6478', maxTicksLimit: 10 },
                        },
                        y: {
                            grid: { color: 'rgba(42, 53, 80, 0.5)' },
                            ticks: { color: '#5a6478' },
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        function addLossPoint(step, loss) {
            lossData.labels.push(step);
            lossData.values.push(loss);
            if (lossData.labels.length > MAX_CHART_POINTS) {
                lossData.labels.shift();
                lossData.values.shift();
            }
            lossChart.update('none');
        }

        // --- Stats ---
        function updateStats(data) {
            if (data.step !== undefined) document.getElementById('statStep').textContent = data.step.toLocaleString();
            if (data.loss !== undefined) document.getElementById('statLoss').textContent = data.loss.toFixed(4);
            if (data.tokens_per_sec !== undefined) document.getElementById('statThroughput').textContent = Math.round(data.tokens_per_sec).toLocaleString();
        }

        function updatePeerCount(count) {
            document.getElementById('statPeers').textContent = count;
        }

        // --- Peers ---
        function updatePeers(peers) {
            const tbody = document.getElementById('peerTableBody');
            if (!peers || peers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="empty-state"><div class="icon">📡</div>Waiting for peers…</td></tr>';
                updatePeerCount(0);
                return;
            }
            updatePeerCount(peers.length);
            tbody.innerHTML = peers.map(p => `
                <tr class="fade-in">
                    <td><span class="dot dot-active"></span>${p.status || 'active'}</td>
                    <td>${p.device_name || 'unknown'}</td>
                    <td>${(p.memory_gb || 0).toFixed(1)} GB</td>
                    <td>${(p.compute_tflops || 0).toFixed(1)}</td>
                </tr>
            `).join('');
        }

        // --- Checkpoints ---
        function addCheckpoint(ckpt) {
            const list = document.getElementById('checkpointList');
            if (list.querySelector('.empty-state')) list.innerHTML = '';
            const time = new Date(ckpt.timestamp * 1000).toLocaleTimeString();
            const li = document.createElement('li');
            li.className = 'checkpoint-item fade-in';
            li.innerHTML = `
                <span class="checkpoint-step">step ${ckpt.step.toLocaleString()}</span>
                <span class="checkpoint-loss">loss ${ckpt.loss.toFixed(4)}</span>
                <span class="checkpoint-time">${time}</span>
            `;
            list.prepend(li);
        }

        // --- WebSocket ---
        function connect() {
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${proto}//${location.host}/ws`);

            ws.onopen = () => {
                const badge = document.getElementById('statusBadge');
                badge.textContent = 'Connected';
                badge.className = 'status-badge status-connected';
            };

            ws.onclose = () => {
                const badge = document.getElementById('statusBadge');
                badge.textContent = 'Disconnected';
                badge.className = 'status-badge status-disconnected';
                // Reconnect after 3 seconds
                setTimeout(connect, 3000);
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);

                switch (msg.type) {
                    case 'init':
                        // Load historical data
                        (msg.metrics || []).forEach(m => {
                            addLossPoint(m.step, m.loss);
                            updateStats(m);
                        });
                        if (msg.cluster && msg.cluster.peers) updatePeers(msg.cluster.peers);
                        (msg.checkpoints || []).forEach(addCheckpoint);
                        break;

                    case 'metric':
                        addLossPoint(msg.step, msg.loss);
                        updateStats(msg);
                        break;

                    case 'cluster':
                        if (msg.peers) updatePeers(msg.peers);
                        break;

                    case 'checkpoint':
                        addCheckpoint(msg);
                        break;
                }
            };
        }

        // --- Init ---
        initChart();
        connect();
    </script>
</body>
</html>
